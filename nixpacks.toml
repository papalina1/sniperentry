[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "cd backend && npm ci",
  "cd frontend && npm ci"
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "cd backend && npm run build",
  # Copy frontend dist so Express can serve it
  "cp -r frontend/dist backend/dist/../frontend/dist"
]

[start]
cmd = "node backend/dist/index.js"
